name: Reusable Microservice CI/CD

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      SERVICE_NAME: ${{ inputs.service_name }}
      SERVICE_PATH: ${{ inputs.service_path }}
      ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ${{ inputs.service_path }}/package-lock.json

      - name: Install Dependencies
        run: |
          cd "$SERVICE_PATH"
          npm ci

      - name: Run Unit Tests
        run: |
          cd "$SERVICE_PATH"
          # Check if a test script is defined in package.json before running npm test
          if node -e "const pkg = require('./package.json'); if (!pkg.scripts || !pkg.scripts.test) process.exit(1);" 2>/dev/null; then
            echo "Test script found. Running npm test..."
            npm test
          else
            echo "No test script defined in package.json. Skipping testing."
          fi


      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Configure AWS Credentials (OIDC Federation)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::462355914183:role/elderpinq-${{ inputs.environment }}-github-actions-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine Image Tag
        id: get-tag
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            CLEAN_TAG="${{ github.ref_name }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            CLEAN_TAG="sha-${SHORT_SHA}"
          fi
          echo "image_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

      - name: Build and Tag Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: elderpinq-${{ inputs.environment }}-${{ inputs.service_name }}
          IMAGE_TAG: ${{ steps.get-tag.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f "$SERVICE_PATH/Dockerfile" .


      - name: Vulnerability Scan Image (Trivy)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: elderpinq-${{ inputs.environment }}-${{ inputs.service_name }}
          IMAGE_TAG: ${{ steps.get-tag.outputs.image_tag }}
        run: |
          # Fail pipeline on high or critical findings in compiled image
          trivy image --exit-code 1 --severity CRITICAL $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: elderpinq-${{ inputs.environment }}-${{ inputs.service_name }}
          IMAGE_TAG: ${{ steps.get-tag.outputs.image_tag }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Helm Chart Values (GitOps)
        env:
          IMAGE_TAG: ${{ steps.get-tag.outputs.image_tag }}
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          git config --global user.name "gitops-bot"
          git config --global user.email "gitops@elderpinq.com"
          
          # Clone the separate GitOps repository
          git clone https://x-access-token:${{ secrets.GITOPS_PAT || secrets.GITHUB_TOKEN }}@github.com/AWS-Elderping/elderping-gitops.git gitops-repo
          cd gitops-repo
          
          # Target environments/<env>/<service>-values.yaml
          TARGET_FILE="environments/$ENVIRONMENT/$SERVICE_NAME-values.yaml"
          
          if [ -f "$TARGET_FILE" ]; then
            sed -i "s/tag: .*/tag: \"${IMAGE_TAG}\"/g" "$TARGET_FILE"
            git add "$TARGET_FILE"
            git commit -m "Auto-bump: $SERVICE_NAME image tag to ${IMAGE_TAG} for $ENVIRONMENT [skip ci]"
            git push origin main
          else
            echo "Warning: Target file $TARGET_FILE not found in GitOps repository. Skipping auto-bump."
          fi
